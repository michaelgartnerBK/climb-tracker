<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIMB / Tracker</title>
<link rel="manifest" href="/manifest-client.json">
<link rel="apple-touch-icon" href="/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CLIMB">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#080808;--card:#181818;--border:#333;--border-mid:#606060;
  --white:#e0e0e0;--muted:#999;--muted2:#bbb;
  --green:#b8ff57;--green-dim:rgba(184,255,87,0.1);
  --red:#ff4444;--gold:#f0d060;--blue:#7eb8ff;
}
html{background:var(--black);}
body{background:var(--black);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-weight:300;min-height:100vh;max-width:540px;margin:0 auto;padding:0 0 100px;}
.status-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:40px;text-align:center;}
.spinner{width:24px;height:24px;border:1px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
.status-label{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);}
@keyframes spin{to{transform:rotate(360deg);}}
.hero{padding:40px 24px 28px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.hero-slash{position:absolute;right:-10px;top:-30px;font-size:200px;font-weight:900;color:#fff;opacity:0.02;line-height:1;pointer-events:none;user-select:none;}
.hero-logo{font-size:clamp(60px,16vw,80px);font-weight:900;line-height:0.85;letter-spacing:-0.01em;}
.hero-sub{font-size:12px;font-weight:300;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;margin-top:5px;}
.hero-bottom{margin-top:20px;display:flex;align-items:flex-end;justify-content:space-between;}
.hero-name{font-size:clamp(20px,6vw,26px);font-weight:700;letter-spacing:0.12em;text-transform:uppercase;}
.hero-wk{font-size:11px;font-weight:300;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.wk-nav{display:flex;align-items:center;gap:10px;margin-top:6px;}
.wk-arrow{font-size:13px;color:#444;cursor:pointer;user-select:none;transition:color 0.15s;}
.wk-arrow:hover{color:#888;}
.wk-arrow.off{color:#1e1e1e;cursor:not-allowed;}
.wk-nav-date{font-size:10px;font-weight:300;letter-spacing:0.22em;color:#555;text-transform:uppercase;}
.wk-nav-now{font-size:10px;font-weight:300;letter-spacing:0.22em;color:#555;text-transform:uppercase;}
.streak-block{text-align:right;}
.streak-num{font-size:38px;font-weight:900;line-height:1;letter-spacing:-0.02em;animation:streakPop 0.6s ease 0.3s both;}
.streak-lbl{font-size:8px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#555;margin-top:3px;}
@keyframes streakPop{0%{opacity:0;transform:scale(0.6);}60%{transform:scale(1.18);}80%{transform:scale(0.96);}100%{opacity:1;transform:scale(1);}}
.coach-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);animation:overlayIn 0.3s ease both;cursor:pointer;}
@keyframes overlayIn{from{opacity:0;}to{opacity:1;}}
.coach-card{background:#111;border:1px solid #2a2a2a;border-bottom:none;border-radius:16px 16px 0 0;padding:32px 28px 48px;width:100%;max-width:540px;animation:cardUp 0.35s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes cardUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.coach-overlay-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:20px;}
.coach-overlay-dot{width:6px;height:6px;border-radius:50%;background:var(--white);}
.coach-overlay-lbl{font-size:10px;font-weight:700;letter-spacing:0.3em;text-transform:uppercase;color:#666;}
.coach-overlay-dismiss{margin-left:auto;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#444;}
.coach-overlay-msg{font-size:clamp(20px,5vw,26px);font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--white);line-height:1.3;}
.coach-overlay-meta{font-size:10px;letter-spacing:0.15em;color:#444;text-transform:uppercase;margin-top:16px;}
.score-strip{display:flex;align-items:stretch;border-bottom:1px solid var(--border);}
.score-main{padding:18px 22px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;flex-shrink:0;}

.score-eyebrow{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.score-num{font-size:64px;font-weight:900;line-height:1;letter-spacing:-0.02em;}
.score-denom{font-size:13px;font-weight:300;color:#555;margin-top:-2px;}

.verdict{padding:10px 24px;border-bottom:1px solid var(--border);}
.verdict-txt{font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;}
.col-headers{display:grid;grid-template-columns:60px 1fr 1fr 1fr;border-bottom:1px solid var(--border);background:var(--black);position:sticky;top:0;z-index:10;}
.col-h{padding:9px 4px;text-align:center;border-left:1px solid var(--border);}
.col-h:first-child{border-left:none;}
.col-h-main{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#777;}
.col-h-pct{font-size:8px;color:#555;margin-top:1px;}
.day-row{display:grid;grid-template-columns:60px 1fr 1fr 1fr;border-bottom:1px solid #242424;min-height:58px;position:relative;}
.day-row:last-child{border-bottom:none;}
.day-bar{position:absolute;left:0;top:0;bottom:0;width:2px;}
.day-lbl{padding:12px 0 12px 18px;}
.day-main{font-size:18px;font-weight:900;}
.day-sub{font-size:8px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;}
.day-cell{display:flex;align-items:center;justify-content:center;border-left:1px solid #242424;padding:6px 5px;}
.tbtn{width:100%;height:32px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;border:none;}
.tbtn.done{background:var(--white);color:#080808;}
.tbtn.empty{background:transparent;border:1px solid var(--border-mid);color:var(--muted2);}
.tbtn.disabled{background:transparent;border:1px solid #2a2a2a;color:#2a2a2a;cursor:not-allowed;}
.tbtn.ontop{background:var(--gold);color:#080808;}
.save-dot{position:fixed;bottom:24px;right:24px;width:8px;height:8px;border-radius:50%;background:var(--green);opacity:0;transition:opacity 0.3s;z-index:100;box-shadow:0 0 12px var(--green);}
.save-dot.visible{opacity:1;}

.bars-col{flex:1;display:flex;flex-direction:column;justify-content:center;gap:13px;padding:18px 16px;}
.bar-row{display:flex;flex-direction:column;gap:5px;}
.bar-hdr{display:flex;justify-content:space-between;align-items:baseline;}
.bar-lbl{font-size:9px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:#666;}
.bar-pct{font-size:12px;font-weight:300;color:#555;}
.bar-track{height:3px;background:#1e1e1e;border-radius:2px;overflow:hidden;}
.bar-fill-el{height:100%;border-radius:2px;background:#444;transition:width 1.2s cubic-bezier(0.22,1,0.36,1);}
.bar-fill-el.sleep{background:#7eb8ff;}
.bar-fill-el.food{background:#b8ff57;}
.bar-fill-el.work{background:#e0e0e0;}
</style>

<body>
<div id="app"><div class="status-screen"><div class="spinner"></div><div class="status-label">Loading…</div></div></div>
<div class="save-dot" id="saveDot"></div>
<script>
const SB_URL='https://uuikrsuirncssjipnwls.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1aWtyc3Vpcm5jc3NqaXBud2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTk0NzgsImV4cCI6MjA5MTQ5NTQ3OH0.4wW7T9HYCL9BzRpAViygFAg9nKTxqyTZQ5IL1LDYxKY';
const DAYS=['Mo','Tu','We','Th','Fr','Sa','Su'];
const FULL=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const params=new URLSearchParams(location.search);
const urlId=params.get('id');
function setCookie(name,value,days){const e=new Date();e.setDate(e.getDate()+days);document.cookie=`${name}=${value};expires=${e.toUTCString()};path=/;SameSite=Lax`;}
function getCookie(name){return document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(name+'='))?.split('=')[1]||null;}
if(urlId){setCookie('climb_client_id',urlId,365);localStorage.setItem('climb_client_id',urlId);}
const CLIENT_ID=urlId||getCookie('climb_client_id')||localStorage.getItem('climb_client_id');

// currentWS is set ONCE at init - never recalculated during session
let clientData=null, state=DAYS.map(()=>({training:null,food:null,sleep:null,bonus_training:null}));
let maxSessions=3, saveTimeouts={}, allCheckins=[], currentWS=null, viewWS=null;
let allWeekStates={};
let isEditable=true;

function localDate(d){
  const dt=d||new Date();
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function weekStart(offset=0){
  const d=new Date();
  const day=d.getDay(), dfm=(day+6)%7;
  d.setDate(d.getDate()-dfm+offset*7);
  d.setHours(12,0,0,0);
  return localDate(d);
}

function getKW(ws){
  const d=new Date(ws+'T12:00:00');
  const year=d.getFullYear();
  // Find Thursday of current week (ISO weeks defined by Thursday)
  const thu=new Date(d);
  thu.setDate(d.getDate()-(d.getDay()||7)+4);
  // Find first Thursday of the year
  const yearStart=new Date(thu.getFullYear(),0,1);
  // Calculate week number
  return Math.ceil(((thu-yearStart)/86400000+1)/7);
}

function weekLabel(ws){
  const d=new Date(ws+'T12:00:00'), e=new Date(ws+'T12:00:00');
  e.setDate(e.getDate()+6);
  const f=x=>x.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit'});
  return `${f(d)}–${f(e)}`;
}

async function api(path,method='GET',body=null){
  const res=await fetch(`${SB_URL}/rest/v1/${path}`,{
    method,
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json',
      'Prefer':method==='POST'?'resolution=merge-duplicates,return=representation':'return=representation'},
    body:body?JSON.stringify(body):null
  });
  const t=await res.text();return t?JSON.parse(t):null;
}

async function init(){
  if(!CLIENT_ID){
    document.getElementById('app').innerHTML=`<div class="status-screen"><div class="status-label">No link – use the link from your coach</div></div>`;
    return;
  }
  try{
    const clients=await api(`clients?id=eq.${CLIENT_ID}&select=*`);
    if(!clients?.length) throw new Error('Client not found');
    clientData=clients[0];
    maxSessions=parseInt((clientData.training_days||['3'])[0])||3;

    // Set currentWS once - reuse for entire session
    currentWS=weekStart();
    viewWS=currentWS;

    // Load all checkins for week navigation (8 weeks back)
    const rangeStart=weekStart(-8);
    const allWeekCheckins=await api(`checkins?client_id=eq.${CLIENT_ID}&week_start=gte.${rangeStart}&select=*&order=week_start.desc`)||[];

    // Cache all weeks
    allWeekCheckins.forEach(c=>{
      if(!allWeekStates[c.week_start]) allWeekStates[c.week_start]=DAYS.map(()=>({training:null,food:null,sleep:null,bonus_training:null}));
      allWeekStates[c.week_start][c.day_index]={training:c.training,food:c.food,sleep:c.sleep,bonus_training:c.bonus_training};
    });

    // Reset state for current week
    state=allWeekStates[currentWS]||DAYS.map(()=>({training:null,food:null,sleep:null,bonus_training:null}));

    // All historical for streak
    allCheckins=await api(`checkins?client_id=eq.${CLIENT_ID}&select=*&order=week_start.desc`)||[];

    const msgs=await api(`coach_messages?client_id=eq.${CLIENT_ID}&expires_at=gte.${localDate()}&select=*&order=created_at.desc&limit=1`);
    renderApp(msgs?.[0]||null);
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="status-screen"><div class="status-label">Error: ${e.message}</div><button onclick="init()" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid #333;padding:8px 20px;border-radius:2px;cursor:pointer;">Retry</button></div>`;
  }
}

function calcScore(weekData){
  const n=maxSessions;
  let tP=0,fP=0,sP=0;
  const ptT=n>0?30/n:0, ptF=40/7, ptS=30/7;
  for(let i=0;i<7;i++){
    const c=weekData[i];if(!c) continue;
    if(c.training===true||c.bonus_training===true) tP=Math.min(30,tP+ptT);
    if(c.food===true) fP+=ptF;
    if(c.sleep===true) sP+=ptS;
  }
  return{total:Math.round(tP+fP+sP),t:Math.round(tP),f:Math.round(fP),s:Math.round(sP)};
}

function getStreak(){
  try{
    const weeks={};
    allCheckins.forEach(c=>{
      if(c.week_start===currentWS) return;
      if(!weeks[c.week_start]) weeks[c.week_start]={};
      weeks[c.week_start][c.day_index]=c;
    });
    const sorted=Object.keys(weeks).sort().reverse();
    let streak=0;
    for(const ws of sorted){
      if(calcScore(weeks[ws]).total>=70) streak++;
      else break;
    }
    return streak;
  }catch(e){return 0;}
}

function sColor(s){
  const todayIdx=(new Date().getDay()+6)%7;
  const maxSoFar=Math.round(((todayIdx+1)/7)*100);
  const ratio=maxSoFar>0?s/maxSoFar:0;
  if(ratio>=0.95) return 'var(--green)';
  if(ratio>=0.75) return 'var(--gold)';
  if(ratio>=0.5) return '#e87a2a';
  return 'var(--red)';
}

function getDayProgress(){return (new Date().getDay()+6)%7;}

function getVerdict(total){
  const todayIdx=getDayProgress(); // 0=Mo, 6=So
  // Days remaining INCLUDING today
  const rem=7-todayIdx;
  const dl=rem===1?'· 1 day left':`· ${rem} days left`;
  // Max possible score from Mon through today (todayIdx+1 days)
  const daysLogged=todayIdx+1;
  const maxSoFar=Math.round((daysLogged/7)*100);
  const ratio=maxSoFar>0?total/maxSoFar:0;
  if(ratio>=0.95) return{text:`CLIMB MODE ${dl}`,col:'var(--white)',bg:'transparent'};
  if(ratio>=0.75) return{text:`STRONG ${dl}`,col:'var(--white)',bg:'transparent'};
  if(ratio>=0.5) return{text:`BEHIND PACE ${dl}`,col:'var(--gold)',bg:'rgba(240,208,96,0.04)'};
  if(ratio>=0.25) return{text:`PUSH NOW ${dl}`,col:'#e87a2a',bg:'rgba(232,122,42,0.04)'};
  return{text:`RESET ${dl}`,col:'var(--red)',bg:'rgba(255,68,68,0.04)'};
}

function renderApp(msg){
  const isNowView=viewWS===currentWS;
  const kw=getKW(viewWS), wlbl=weekLabel(viewWS);
  const viewState=isNowView?state:(allWeekStates[viewWS]||DAYS.map(()=>({training:null,food:null,sleep:null,bonus_training:null})));
  const score=calcScore(viewState);
  const streak=getStreak();
  const verdict=getVerdict(score.total);
  const any=viewState.some(s=>s.training===true||s.bonus_training===true||s.food===true||s.sleep===true);
  const col=any?sColor(score.total):'var(--white)';
  const todayIdx=(new Date().getDay()+6)%7;
  const prevWS=weekStart(-1);
  const inGrace=viewWS===prevWS&&todayIdx<=1;
  isEditable=isNowView||inGrace;
    document.getElementById('app').innerHTML=`
    <div class="hero">
      <div class="hero-slash">/</div>
      <div class="hero-logo">CLIMB</div>
      <div class="hero-sub">/ Tracker</div>
      <div class="hero-bottom">
        <div>
          <div class="hero-name">${clientData.name}</div>
          <div class="wk-nav">
            <span class="wk-arrow${viewWS<=weekStart(-8)?' off':''}" onclick="changeWeek(-1)">←</span>
            <span class="wk-nav-date">${wlbl}</span>
            ${isNowView?`<span class="wk-nav-now">· Now</span>`:''}
            <span class="wk-arrow${isNowView?' off':''}" onclick="changeWeek(1)">→</span>
          </div>
        </div>
        ${streak>0?`<div class="streak-block"><div class="streak-num">${streak}</div><div class="streak-lbl">Week Streak</div></div>`:''}
      </div>
    </div>
    ${msg&&getCookie('climb_seen_msg')!==msg.id?`<div class="coach-overlay" id="coachOverlay" onclick="setCookie('climb_seen_msg','${msg.id}',365);document.getElementById('coachOverlay').style.display='none'"><div class="coach-card"><div class="coach-overlay-eyebrow"><div class="coach-overlay-dot"></div><div class="coach-overlay-lbl">Coach Message</div><div class="coach-overlay-dismiss">Tap to close</div></div><div class="coach-overlay-msg">${msg.message}</div><div class="coach-overlay-meta">${daysAgo(msg.created_at)}</div></div></div>`:''}
    <div class="score-strip">
      <div class="score-main">
        <div class="score-eyebrow" style="color:var(--muted);">Weekly Score</div>
        <div class="score-num" id="score-num" style="color:#555;">0</div>
        <div class="score-denom">/ 100</div>
      </div>
      <div class="bars-col">
        <div class="bar-row"><div class="bar-hdr"><div class="bar-lbl" style="color:#7eb8ff;">Sleep</div><div class="bar-pct" id="pct-slp">0%</div></div><div class="bar-track"><div class="bar-fill-el sleep" id="bar-slp" style="width:0%;"></div></div></div>
        <div class="bar-row"><div class="bar-hdr"><div class="bar-lbl" style="color:#b8ff57;">Food</div><div class="bar-pct" id="pct-food">0%</div></div><div class="bar-track"><div class="bar-fill-el food" id="bar-food" style="width:0%;"></div></div></div>
        <div class="bar-row"><div class="bar-hdr"><div class="bar-lbl" style="color:#e0e0e0;">Work</div><div class="bar-pct" id="pct-wrk">0%</div></div><div class="bar-track"><div class="bar-fill-el work" id="bar-wrk" style="width:0%;"></div></div></div>
      </div>
    </div>
    <div class="verdict" style="background:transparent;border-bottom:1px solid var(--border);">
      <div class="verdict-txt" id="verdict-txt" style="color:#555;">—</div>
    </div>
    <div id="daysSection" style="opacity:${isEditable?'1':'0.5'};pointer-events:${isEditable?'auto':'none'};"></div>
  `;
  renderDays();
  // Animate score, bars, streak after DOM ready
  const targetScore=score.total;
  const targetSlp=Math.min(100,Math.round((score.s/30)*100));
  const targetFood=Math.min(100,Math.round((score.f/40)*100));
  const targetWrk=Math.min(100,Math.round((score.t/30)*100));
  const targetStreak=streak;

  function animVal(el,from,to,dur,suffix,onUpdate){
    const start=performance.now();
    function step(now){
      const p=Math.min((now-start)/dur,1);
      const ease=1-Math.pow(1-p,3);
      const val=Math.round(from+(to-from)*ease);
      if(el) el.textContent=val+(suffix||'');
      if(onUpdate) onUpdate(val);
      if(p<1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  setTimeout(()=>{
    // Animate bars
    const slpBar=document.getElementById('bar-slp');
    const foodBar=document.getElementById('bar-food');
    const wrkBar=document.getElementById('bar-wrk');
    if(slpBar) slpBar.style.width=targetSlp+'%';
    if(foodBar) foodBar.style.width=targetFood+'%';
    if(wrkBar) wrkBar.style.width=targetWrk+'%';
    animVal(document.getElementById('pct-slp'),0,targetSlp,1200,'%',null);
    animVal(document.getElementById('pct-food'),0,targetFood,1200,'%',null);
    animVal(document.getElementById('pct-wrk'),0,targetWrk,1200,'%',null);

    // Animate score with color
    animVal(document.getElementById('score-num'),0,targetScore,1400,'',v=>{
      const el=document.getElementById('score-num');
      if(!el) return;
      if(!any){el.style.color='var(--white)';return;}
      const todayI=(new Date().getDay()+6)%7;
      const mx=isNowView?Math.round(((todayI+1)/7)*100):100;
      const r=mx>0?v/mx:0;
      el.style.color=r>=0.95?'var(--green)':r>=0.75?'var(--gold)':r>=0.5?'#e87a2a':'var(--red)';
    });

    // Animate streak
    if(targetStreak>0){
      animVal(document.querySelector('.streak-num'),0,targetStreak,900,'',null);
    }

    // Show verdict after score finishes
    setTimeout(()=>{
      const vEl=document.getElementById('verdict-txt');
      const vStrip=document.querySelector('.verdict');
      if(vEl&&isNowView){
        vEl.textContent=any?verdict.text:'Start your week →';
        vEl.style.color=verdict.col;
        if(vStrip) vStrip.style.background=verdict.bg;
      } else if(vEl){
        vEl.textContent=inGrace?wlbl+' · editable until Tue':wlbl;
        vEl.style.color='#555';
      }
    },1300);
  },200);
}

function daysAgo(ts){
  const diff=Math.floor((Date.now()-new Date(ts))/(86400000));
  if(diff===0) return 'Today'; if(diff===1) return '1 day ago'; return `${diff} days ago`;
}

function changeWeek(d){
  const curDate=new Date(currentWS+'T12:00:00');
  const viewDate=new Date(viewWS+'T12:00:00');
  const offsetWeeks=Math.round((viewDate-curDate)/(7*86400000));
  const newOffset=offsetWeeks+d;
  if(newOffset>0||newOffset<-8) return;
  viewWS=weekStart(newOffset);
  renderApp(null);
  renderDays();
}

function renderDays(){
  const container=document.getElementById('daysSection');
  if(!container) return;
  container.innerHTML='';
  const isNowView=viewWS===currentWS;
  const viewState=isNowView?state:(allWeekStates[viewWS]||DAYS.map(()=>({training:null,food:null,sleep:null,bonus_training:null})));
  // Count only regular training (not bonus) against pflicht limit
  const pflichtDone=viewState.filter(s=>s.training===true).length;
  const pflichtVoll=pflichtDone>=maxSessions;
  DAYS.forEach((day,i)=>{
    const s=viewState[i];
    const allDone=(s.training===true||s.bonus_training===true)&&s.food===true&&s.sleep===true;
    const anyDone=s.training===true||s.bonus_training===true||s.food===true||s.sleep===true;
    const row=document.createElement('div');
    row.className='day-row';
    row.innerHTML=`
      <div class="day-bar" style="background:${allDone?'var(--white)':anyDone?'#444':'transparent'};"></div>
      <div class="day-lbl"><div class="day-main">${day}</div><div class="day-sub">${FULL[i].substring(0,3).toUpperCase()}</div></div>
      <div class="day-cell">${tbtn(i,'sleep',s.sleep,false,'SLEEP')}</div>
      <div class="day-cell">${tbtn(i,'food',s.food,false,'FOOD')}</div>
      <div class="day-cell">${tbtnWork(i,s.training,s.bonus_training,pflichtVoll)}</div>
    `;
    container.appendChild(row);
  });
}

function tbtn(di,key,val,disabled,label){
  if(val===true) return `<button class="tbtn done" onclick="toggle(${di},'${key}')">✓ DONE</button>`;
  if(disabled) return `<button class="tbtn disabled">${label}</button>`;
  return `<button class="tbtn empty" onclick="toggle(${di},'${key}')">${label}</button>`;
}

// pflichtVoll = alle Pflicht-Sessions dieser Woche sind erfüllt
function tbtnWork(di,training,bonus,pflichtVoll){
  if(bonus===true) return `<button class="tbtn ontop" onclick="toggleWork(${di})">✓ ON TOP</button>`;
  if(training===true) return `<button class="tbtn done" onclick="toggleWork(${di})">✓ DONE</button>`;
  // Leer: immer klickbar - Farbe unterscheidet ob Pflicht voll
  return `<button class="tbtn empty" onclick="toggleWork(${di})" style="${pflichtVoll?'border-color:#555;color:#888;':''}">WORK</button>`;
}

function toggle(di,key){
  const inGrace=getInGrace();
  const targetState=getTargetState(inGrace);
  targetState[di][key]=targetState[di][key]===true?null:true;
  renderDays();
  updateScoreDisplay();
  saveField(di,key,targetState[di][key],viewWS);
}

function toggleWork(di){
  const inGrace=getInGrace();
  const targetState=getTargetState(inGrace);
  const s=targetState[di];
  // Count regular training sessions (not bonus)
  const pflichtDone=targetState.filter(x=>x.training===true).length;
  const pflichtVoll=pflichtDone>=maxSessions;

  if(s.bonus_training===true){
    // ✓ ON TOP → leer
    s.bonus_training=null;
    saveField(di,'bonus_training',null,viewWS);
  } else if(s.training===true){
    // ✓ DONE → leer (removes from pflicht count)
    s.training=null;
    saveField(di,'training',null,viewWS);
  } else {
    // WORK (leer):
    // Pflicht noch nicht voll → DONE (zählt als Pflicht)
    // Pflicht voll → ON TOP (zählt als Bonus)
    if(pflichtVoll){
      s.bonus_training=true; s.training=null;
      saveField(di,'bonus_training',true,viewWS);
    } else {
      s.training=true; s.bonus_training=null;
      saveField(di,'training',true,viewWS);
    }
  }
  renderDays();
  updateScoreDisplay();
}

function getInGrace(){
  const todayIdx=(new Date().getDay()+6)%7;
  return viewWS===weekStart(-1)&&todayIdx<=1;
}

function getTargetState(inGrace){
  if(inGrace){
    if(!allWeekStates[viewWS]) allWeekStates[viewWS]=DAYS.map(()=>({training:null,food:null,sleep:null,bonus_training:null}));
    return allWeekStates[viewWS];
  }
  return state;
}

function updateScoreDisplay(){
  const isNowView=viewWS===currentWS;
  const viewState=isNowView?state:(allWeekStates[viewWS]||DAYS.map(()=>({training:null,food:null,sleep:null,bonus_training:null})));
  const score=calcScore(viewState);
  const any=viewState.some(s=>s.training===true||s.bonus_training===true||s.food===true||s.sleep===true);
  // Score number
  const el=document.querySelector('#score-num')||document.querySelector('.score-num');
  if(el){el.textContent=score.total;el.style.color=any?sColor(score.total):'var(--white)';}
  // Update bars
  const bars=[
    {id:'bar-slp',pct:'pct-slp',v:score.s,m:30},
    {id:'bar-food',pct:'pct-food',v:score.f,m:40},
    {id:'bar-wrk',pct:'pct-wrk',v:score.t,m:30}
  ];
  bars.forEach(b=>{
    const pct=Math.min(100,(b.v/b.m)*100);
    const bEl=document.getElementById(b.id);
    const pEl=document.getElementById(b.pct);
    if(bEl) bEl.style.width=pct+'%';
    if(pEl) pEl.textContent=Math.round(pct)+'%';
  });
  // Verdict
  const v=getVerdict(score.total);
  const vEl=document.querySelector('.verdict-txt');
  const vStrip=document.querySelector('.verdict');
  if(vEl){vEl.textContent=any?v.text:'Start your week →';vEl.style.color=v.col;}
  if(vStrip) vStrip.style.background=v.bg;
}

async function saveField(di,key,val,ws){
  ws=ws||currentWS;
  try{
    // Check if row exists
    const existing=await api(`checkins?client_id=eq.${CLIENT_ID}&week_start=eq.${ws}&day_index=eq.${di}&select=id,training,food,sleep,bonus_training`);
    if(existing&&existing.length>0){
      const patch={[key]:val,updated_at:new Date().toISOString()};
      await fetch(`${SB_URL}/rest/v1/checkins?client_id=eq.${CLIENT_ID}&week_start=eq.${ws}&day_index=eq.${di}`,{
        method:'PATCH',
        headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify(patch)
      });
      const row=existing[0];
      state[di]={training:row.training,food:row.food,sleep:row.sleep,bonus_training:row.bonus_training};
      state[di][key]=val;
    } else {
      // Row doesn't exist - INSERT with just this field
      const insert={client_id:CLIENT_ID,week_start:ws,day_index:di,training:null,food:null,sleep:null,updated_at:new Date().toISOString()};
      insert[key]=val;
      // If val is null and no row exists, nothing to save
      if(val===null) return;
      await api('checkins','POST',insert);
    }
    const dot=document.getElementById('saveDot');
    if(dot){dot.classList.add('visible');setTimeout(()=>dot.classList.remove('visible'),1500);}
  }catch(e){console.error('Save failed:',e);}
}

init();
</script>
