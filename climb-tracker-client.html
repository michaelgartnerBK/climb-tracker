<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLIMB / Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#080808;--card:#181818;--border:#333;--border-mid:#606060;
  --white:#f0f0f0;--muted:#999;--muted2:#bbb;
  --green:#b8ff57;--green-dim:rgba(184,255,87,0.1);
  --red:#ff4444;--gold:#f0d060;--blue:#7eb8ff;
}
html{background:var(--black);}
body{background:var(--black);color:var(--white);font-family:'Barlow Condensed',sans-serif;font-weight:300;min-height:100vh;max-width:540px;margin:0 auto;padding:0 0 100px;}
.status-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;padding:40px;text-align:center;}
.spinner{width:24px;height:24px;border:1px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;}
.status-label{font-size:11px;letter-spacing:0.25em;text-transform:uppercase;color:var(--muted);}
@keyframes spin{to{transform:rotate(360deg);}}
.hero{padding:40px 24px 28px;border-bottom:1px solid var(--border);position:relative;overflow:hidden;}
.hero-slash{position:absolute;right:-10px;top:-30px;font-size:200px;font-weight:900;color:#fff;opacity:0.02;line-height:1;pointer-events:none;user-select:none;}
.hero-logo{font-size:clamp(60px,16vw,80px);font-weight:900;line-height:0.85;letter-spacing:-0.01em;}
.hero-sub{font-size:12px;font-weight:300;letter-spacing:0.3em;color:var(--muted);text-transform:uppercase;margin-top:5px;}
.hero-bottom{margin-top:20px;display:flex;align-items:flex-end;justify-content:space-between;}
.hero-name{font-size:clamp(20px,6vw,26px);font-weight:700;letter-spacing:0.12em;text-transform:uppercase;}
.hero-wk{font-size:11px;font-weight:300;letter-spacing:0.18em;color:var(--muted);text-transform:uppercase;margin-top:4px;}
.streak-block{text-align:right;}
.streak-num{font-size:38px;font-weight:900;line-height:1;letter-spacing:-0.02em;animation:streakPop 0.6s ease 0.3s both;}
.streak-lbl{font-size:8px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:#555;margin-top:3px;}
@keyframes streakPop{0%{opacity:0;transform:scale(0.6);}60%{transform:scale(1.18);}80%{transform:scale(0.96);}100%{opacity:1;transform:scale(1);}}
.coach-msg{padding:13px 24px;border-bottom:1px solid var(--border);background:#0c0c0c;}
.coach-eyebrow{font-size:9px;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:#555;margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.coach-dot{width:5px;height:5px;border-radius:50%;background:#777;flex-shrink:0;}
.coach-text{font-family:'Barlow',sans-serif;font-size:13px;color:#999;line-height:1.6;font-weight:300;}
.coach-meta{font-size:9px;letter-spacing:0.1em;color:#444;text-transform:uppercase;margin-top:7px;}
.score-strip{display:flex;border-bottom:1px solid var(--border);}
.score-main{flex:1;padding:18px 24px;border-right:1px solid var(--border);}
.score-eyebrow{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.score-num{font-size:64px;font-weight:900;line-height:1;letter-spacing:-0.02em;}
.score-denom{font-size:13px;font-weight:300;color:#555;margin-top:-2px;}
.score-cats{display:flex;flex-direction:column;justify-content:center;gap:10px;padding:16px 18px;min-width:100px;}
.cat{display:flex;align-items:center;gap:6px;}
.cat-lbl{font-size:9px;letter-spacing:0.1em;color:var(--muted);width:32px;}
.cat-track{flex:1;height:2px;background:#2a2a2a;border-radius:1px;overflow:hidden;}
.cat-fill{height:100%;border-radius:1px;transition:width 0.4s ease;}
.cat-pts{font-size:11px;font-weight:700;color:var(--white);width:20px;text-align:right;}
.verdict{padding:10px 24px;border-bottom:1px solid var(--border);}
.verdict-txt{font-size:11px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;}
.col-headers{display:grid;grid-template-columns:60px 1fr 1fr 1fr;border-bottom:1px solid var(--border);background:var(--black);position:sticky;top:0;z-index:10;}
.col-h{padding:9px 4px;text-align:center;border-left:1px solid var(--border);}
.col-h:first-child{border-left:none;}
.col-h-main{font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#777;}
.col-h-pct{font-size:8px;color:#555;margin-top:1px;}
.day-row{display:grid;grid-template-columns:60px 1fr 1fr 1fr;border-bottom:1px solid #242424;min-height:58px;position:relative;}
.day-row:last-child{border-bottom:none;}
.day-bar{position:absolute;left:0;top:0;bottom:0;width:2px;}
.day-lbl{padding:12px 0 12px 18px;}
.day-main{font-size:18px;font-weight:900;}
.day-sub{font-size:8px;letter-spacing:0.1em;color:var(--muted);text-transform:uppercase;}
.day-cell{display:flex;align-items:center;justify-content:center;border-left:1px solid #242424;padding:6px 5px;}
.tbtn{width:100%;height:32px;border-radius:2px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;border:none;}
.tbtn.done{background:var(--white);color:#080808;}
.tbtn.empty{background:transparent;border:1px solid var(--border-mid);color:var(--muted2);}
.tbtn.disabled{background:transparent;border:1px solid #2a2a2a;color:#2a2a2a;cursor:not-allowed;}
.save-dot{position:fixed;bottom:24px;right:24px;width:8px;height:8px;border-radius:50%;background:var(--green);opacity:0;transition:opacity 0.3s;z-index:100;box-shadow:0 0 12px var(--green);}
.save-dot.visible{opacity:1;}
</style>
<meta property="og:title" content="CLIMB Tracker">
<meta property="og:description" content="Your weekly tracking link">
<meta property="og:image" content="https://tracker.climbcollective.cc/logo.png">
<meta property="og:url" content="https://tracker.climbcollective.cc">
<meta property="og:type" content="website">
</head>
<body>
<div id="app"><div class="status-screen"><div class="spinner"></div><div class="status-label">Loading…</div></div></div>
<div class="save-dot" id="saveDot"></div>
<script>
const SB_URL='https://uuikrsuirncssjipnwls.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1aWtyc3Vpcm5jc3NqaXBud2xzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MTk0NzgsImV4cCI6MjA5MTQ5NTQ3OH0.4wW7T9HYCL9BzRpAViygFAg9nKTxqyTZQ5IL1LDYxKY';
const DAYS=['Mo','Tu','We','Th','Fr','Sa','Su'];
const FULL=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const params=new URLSearchParams(location.search);
const CLIENT_ID=params.get('id');

// currentWS is set ONCE at init - never recalculated during session
let clientData=null, state=DAYS.map(()=>({training:null,food:null,sleep:null}));
let maxSessions=3, saveTimeouts={}, allCheckins=[], currentWS=null;

function localDate(d){
  const dt=d||new Date();
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function weekStart(offset=0){
  const d=new Date();
  const day=d.getDay(), dfm=(day+6)%7;
  d.setDate(d.getDate()-dfm+offset*7);
  d.setHours(12,0,0,0);
  return localDate(d);
}

function getKW(ws){
  const d=new Date(ws+'T12:00:00');
  const year=d.getFullYear();
  // Find Thursday of current week (ISO weeks defined by Thursday)
  const thu=new Date(d);
  thu.setDate(d.getDate()-(d.getDay()||7)+4);
  // Find first Thursday of the year
  const yearStart=new Date(thu.getFullYear(),0,1);
  // Calculate week number
  return Math.ceil(((thu-yearStart)/86400000+1)/7);
}

function weekLabel(ws){
  const d=new Date(ws+'T12:00:00'), e=new Date(ws+'T12:00:00');
  e.setDate(e.getDate()+6);
  const f=x=>x.toLocaleDateString('en-GB',{day:'2-digit',month:'2-digit'});
  return `${f(d)}–${f(e)}`;
}

async function api(path,method='GET',body=null){
  const res=await fetch(`${SB_URL}/rest/v1/${path}`,{
    method,
    headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json',
      'Prefer':method==='POST'?'resolution=merge-duplicates,return=representation':'return=representation'},
    body:body?JSON.stringify(body):null
  });
  const t=await res.text();return t?JSON.parse(t):null;
}

async function init(){
  if(!CLIENT_ID){
    document.getElementById('app').innerHTML=`<div class="status-screen"><div class="status-label">No link – use the link from your coach</div></div>`;
    return;
  }
  try{
    const clients=await api(`clients?id=eq.${CLIENT_ID}&select=*`);
    if(!clients?.length) throw new Error('Client not found');
    clientData=clients[0];
    maxSessions=parseInt((clientData.training_days||['3'])[0])||3;

    // Set currentWS once - reuse for entire session
    currentWS=weekStart();

    // Load wider range to handle any edge cases
    const rangeStart=weekStart(-1);
    const allWeekCheckins=await api(`checkins?client_id=eq.${CLIENT_ID}&week_start=gte.${rangeStart}&select=*&order=week_start.desc`)||[];

    // Reset state
    state=DAYS.map(()=>({training:null,food:null,sleep:null}));

    // Find checkins for this week
    const thisWeekCheckins=allWeekCheckins.filter(c=>c.week_start===currentWS);

    // If exact match found, use it
    if(thisWeekCheckins.length>0){
      thisWeekCheckins.forEach(c=>{
        state[c.day_index]={training:c.training,food:c.food,sleep:c.sleep};
      });
    }

    // All historical for streak
    allCheckins=await api(`checkins?client_id=eq.${CLIENT_ID}&select=*&order=week_start.desc`)||[];

    const msgs=await api(`coach_messages?client_id=eq.${CLIENT_ID}&expires_at=gte.${localDate()}&select=*&order=created_at.desc&limit=1`);
    renderApp(msgs?.[0]||null);
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="status-screen"><div class="status-label">Error: ${e.message}</div><button onclick="init()" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);background:transparent;border:1px solid #333;padding:8px 20px;border-radius:2px;cursor:pointer;">Retry</button></div>`;
  }
}

function calcScore(weekData){
  const n=maxSessions;
  let tP=0,fP=0,sP=0;
  const ptT=n>0?30/n:0, ptF=40/7, ptS=30/7;
  for(let i=0;i<7;i++){
    const c=weekData[i];if(!c) continue;
    if(c.training===true) tP=Math.min(30,tP+ptT);
    if(c.food===true) fP+=ptF;
    if(c.sleep===true) sP+=ptS;
  }
  return{total:Math.round(tP+fP+sP),t:Math.round(tP),f:Math.round(fP),s:Math.round(sP)};
}

function getStreak(){
  try{
    const weeks={};
    allCheckins.forEach(c=>{
      if(c.week_start===currentWS) return;
      if(!weeks[c.week_start]) weeks[c.week_start]={};
      weeks[c.week_start][c.day_index]=c;
    });
    const sorted=Object.keys(weeks).sort().reverse();
    let streak=0;
    for(const ws of sorted){
      if(calcScore(weeks[ws]).total>=70) streak++;
      else break;
    }
    return streak;
  }catch(e){return 0;}
}

function sColor(s){
  if(s>=70) return 'var(--green)';
  if(s>=50) return 'var(--gold)';
  if(s>=30) return '#e87a2a';
  return 'var(--white)';
}

function getDayProgress(){return (new Date().getDay()+6)%7;}

function getVerdict(total){
  const elapsed=getDayProgress()+1;
  const maxSoFar=Math.round((elapsed/7)*100);
  const ratio=maxSoFar>0?total/maxSoFar:0;
  const rem=7-elapsed;
  const dl=rem===1?'· 1 day left':`· ${rem} days left`;
  if(ratio>=0.95) return{text:`CLIMB MODE ${dl}`,col:'var(--white)',bg:'transparent'};
  if(ratio>=0.75) return{text:`STRONG ${dl}`,col:'var(--white)',bg:'transparent'};
  if(ratio>=0.5) return{text:`BEHIND PACE ${dl}`,col:'var(--gold)',bg:'rgba(240,208,96,0.04)'};
  if(ratio>=0.25) return{text:`PUSH NOW ${dl}`,col:'#e87a2a',bg:'rgba(232,122,42,0.04)'};
  return{text:`RESET ${dl}`,col:'var(--red)',bg:'rgba(255,68,68,0.04)'};
}

function renderApp(msg){
  const kw=getKW(currentWS), wlbl=weekLabel(currentWS);
  const score=calcScore(state);
  const streak=getStreak();
  const verdict=getVerdict(score.total);
  const any=state.some(s=>s.training===true||s.food===true||s.sleep===true);
  const col=any?sColor(score.total):'var(--white)';

  document.getElementById('app').innerHTML=`
    <div class="hero">
      <div class="hero-slash">/</div>
      <div class="hero-logo">CLIMB</div>
      <div class="hero-sub">/ Tracker</div>
      <div class="hero-bottom">
        <div>
          <div class="hero-name">${clientData.name}</div>
          <div class="hero-wk">${wlbl}</div>
        </div>
        ${streak>0?`<div class="streak-block"><div class="streak-num">${streak}</div><div class="streak-lbl">Week Streak</div></div>`:''}
      </div>
    </div>
    ${msg?`<div class="coach-msg"><div class="coach-eyebrow"><div class="coach-dot"></div>Coach</div><div class="coach-text">${msg.message}</div><div class="coach-meta">${daysAgo(msg.created_at)} · Coach</div></div>`:''}
    <div class="score-strip">
      <div class="score-main">
        <div class="score-eyebrow">Weekly Score</div>
        <div class="score-num" style="color:${col}">${score.total}</div>
        <div class="score-denom">/ 100</div>
      </div>
      <div class="score-cats">
        <div class="cat"><div class="cat-lbl">WRK</div><div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,(score.t/30)*100)}%;background:#f0f0f0;"></div></div><div class="cat-pts">${score.t}</div></div>
        <div class="cat"><div class="cat-lbl">FOOD</div><div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,(score.f/40)*100)}%;background:var(--green);"></div></div><div class="cat-pts" style="color:var(--green)">${score.f}</div></div>
        <div class="cat"><div class="cat-lbl">SLP</div><div class="cat-track"><div class="cat-fill" style="width:${Math.min(100,(score.s/30)*100)}%;background:var(--blue);"></div></div><div class="cat-pts" style="color:var(--blue)">${score.s}</div></div>
      </div>
    </div>
    <div class="verdict" style="background:${verdict.bg};border-bottom:1px solid var(--border);">
      <div class="verdict-txt" style="color:${verdict.col}">${any?verdict.text:'Start your week →'}</div>
    </div>
    <div class="col-headers">
      <div class="col-h"></div>
      <div class="col-h"><div class="col-h-main">WORK</div><div class="col-h-pct">30%</div></div>
      <div class="col-h"><div class="col-h-main">FOOD</div><div class="col-h-pct">40%</div></div>
      <div class="col-h"><div class="col-h-main">SLEEP</div><div class="col-h-pct">30%</div></div>
    </div>
    <div id="daysSection"></div>
  `;
  renderDays();
}

function daysAgo(ts){
  const diff=Math.floor((Date.now()-new Date(ts))/(86400000));
  if(diff===0) return 'Today'; if(diff===1) return '1 day ago'; return `${diff} days ago`;
}

function renderDays(){
  const container=document.getElementById('daysSection');
  if(!container) return;
  container.innerHTML='';
  const trained=state.filter(s=>s.training===true).length;
  DAYS.forEach((day,i)=>{
    const s=state[i];
    const allDone=s.training===true&&s.food===true&&s.sleep===true;
    const anyDone=s.training===true||s.food===true||s.sleep===true;
    const trDone=s.training===true, trDisabled=!trDone&&trained>=maxSessions;
    const row=document.createElement('div');
    row.className='day-row';
    row.innerHTML=`
      <div class="day-bar" style="background:${allDone?'var(--white)':anyDone?'#444':'transparent'};"></div>
      <div class="day-lbl"><div class="day-main">${day}</div><div class="day-sub">${FULL[i].substring(0,3).toUpperCase()}</div></div>
      <div class="day-cell">${tbtn(i,'training',s.training,trDisabled,'WORK')}</div>
      <div class="day-cell">${tbtn(i,'food',s.food,false,'FOOD')}</div>
      <div class="day-cell">${tbtn(i,'sleep',s.sleep,false,'SLEEP')}</div>
    `;
    container.appendChild(row);
  });
}

function tbtn(di,key,val,disabled,label){
  if(val===true) return `<button class="tbtn done" onclick="toggle(${di},'${key}')">✓ DONE</button>`;
  if(disabled) return `<button class="tbtn disabled">${label}</button>`;
  return `<button class="tbtn empty" onclick="toggle(${di},'${key}')">${label}</button>`;
}

function toggle(di,key){
  state[di][key]=state[di][key]===true?null:true;
  renderDays();
  updateScoreDisplay();
  // Save only the changed field immediately
  saveField(di,key,state[di][key]);
}

function updateScoreDisplay(){
  const score=calcScore(state);
  const any=state.some(s=>s.training===true||s.food===true||s.sleep===true);
  const el=document.querySelector('.score-num');
  if(el){el.textContent=score.total;el.style.color=any?sColor(score.total):'var(--white)';}
  const cats=[{v:score.t,m:30},{v:score.f,m:40},{v:score.s,m:30}];
  document.querySelectorAll('.cat-fill').forEach((f,i)=>{if(cats[i]) f.style.width=Math.min(100,(cats[i].v/cats[i].m)*100)+'%';});
  document.querySelectorAll('.cat-pts').forEach((p,i)=>{if(cats[i]) p.textContent=cats[i].v;});
  const v=getVerdict(score.total);
  const vEl=document.querySelector('.verdict-txt');
  const vStrip=document.querySelector('.verdict');
  if(vEl){vEl.textContent=any?v.text:'Start your week →';vEl.style.color=v.col;}
  if(vStrip) vStrip.style.background=v.bg;
}

async function saveField(di,key,val){
  const ws=currentWS;
  try{
    // Check if row exists
    const existing=await api(`checkins?client_id=eq.${CLIENT_ID}&week_start=eq.${ws}&day_index=eq.${di}&select=id,training,food,sleep`);
    if(existing&&existing.length>0){
      // Row exists - PATCH only the changed field
      const patch={[key]:val,updated_at:new Date().toISOString()};
      await fetch(`${SB_URL}/rest/v1/checkins?client_id=eq.${CLIENT_ID}&week_start=eq.${ws}&day_index=eq.${di}`,{
        method:'PATCH',
        headers:{'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json','Prefer':'return=representation'},
        body:JSON.stringify(patch)
      });
      // Sync local state with DB values
      const row=existing[0];
      state[di]={training:row.training,food:row.food,sleep:row.sleep};
      state[di][key]=val;
    } else {
      // Row doesn't exist - INSERT with just this field
      const insert={client_id:CLIENT_ID,week_start:ws,day_index:di,training:null,food:null,sleep:null,updated_at:new Date().toISOString()};
      insert[key]=val;
      // If val is null and no row exists, nothing to save
      if(val===null) return;
      await api('checkins','POST',insert);
    }
    const dot=document.getElementById('saveDot');
    if(dot){dot.classList.add('visible');setTimeout(()=>dot.classList.remove('visible'),1500);}
  }catch(e){console.error('Save failed:',e);}
}

init();
</script>
</body>
</html>
